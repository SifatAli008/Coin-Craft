# Google OAuth2 Configuration
# Replace these values with your actual Google OAuth2 credentials
# Get these from: https://console.developers.google.com/

# Google OAuth2 Client ID
google.oauth.client.id=YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com

# Google OAuth2 Client Secret
google.oauth.client.secret=YOUR_GOOGLE_CLIENT_SECRET

# Redirect URI (must match the one configured in Google Console)
google.oauth.redirect.uri=http://localhost:8080/Callback

# OAuth2 Scopes
google.oauth.scopes=https://www.googleapis.com/auth/userinfo.email,https://www.googleapis.com/auth/userinfo.profile

# Application Name
google.oauth.application.name=CoinCraft
